name: Preview release validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - toolbox
  push:
    branches:
      - toolbox
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: preview-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-preview:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve Preview release metadata
        id: release
        shell: pwsh
        run: |
          $metadata = ./scripts/get-preview-release-metadata.ps1
          "version=$($metadata.Version)" | Out-File $env:GITHUB_OUTPUT -Append
          "file_version=$($metadata.FileVersion)" | Out-File $env:GITHUB_OUTPUT -Append
          "runtime=$($metadata.Runtime)" | Out-File $env:GITHUB_OUTPUT -Append
          "portable_file=$($metadata.PortableFileName)" | Out-File $env:GITHUB_OUTPUT -Append
          "installer_file=$($metadata.InstallerFileName)" | Out-File $env:GITHUB_OUTPUT -Append
          "manifest_file=$($metadata.ManifestFileName)" | Out-File $env:GITHUB_OUTPUT -Append
          "artifact_name=$($metadata.ValidationArtifactName)" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore

      - name: Build Release
        shell: pwsh
        run: dotnet build -c Release --no-restore

      - name: Deploy development module for smoke test
        shell: pwsh
        run: ./scripts/deploy-dev-modules.ps1 -Configuration Release

      - name: Run module load smoke test
        shell: pwsh
        run: >-
          dotnet run
          --project QingToolbox.DevTools.ModuleLoadSmokeTest
          -c Release
          --no-build

      - name: Build portable Preview archive
        shell: pwsh
        run: ./scripts/publish-preview.ps1

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --version=6.7.1 -y --no-progress
          if ($LASTEXITCODE -ne 0) {
            throw "Chocolatey failed to install Inno Setup 6.7.1."
          }
          $installedIscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $installedIscc -PathType Leaf)) {
            throw "ISCC.exe was not installed at the expected path: $installedIscc"
          }
          $sourceRoot = Split-Path -Parent $installedIscc
          $isolatedRoot = Join-Path $env:RUNNER_TEMP "InnoSetup"
          New-Item -ItemType Directory -Path $isolatedRoot -Force | Out-Null
          Copy-Item -Path (Join-Path $sourceRoot "*") `
            -Destination $isolatedRoot -Recurse
          $isolatedIscc = Join-Path $isolatedRoot "ISCC.exe"
          $preparedIscc = ./scripts/prepare-inno-setup.ps1 `
            -IsccPath $isolatedIscc
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup dependency preparation failed."
          }
          "ISCC_PATH=$preparedIscc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Preview installer
        shell: pwsh
        run: >-
          ./scripts/build-installer.ps1
          -IsccPath $env:ISCC_PATH
          -SkipPreflight

      - name: Test installer roundtrip
        shell: pwsh
        env:
          LOCALAPPDATA: ${{ runner.temp }}\QingToolboxProfile\LocalAppData
          APPDATA: ${{ runner.temp }}\QingToolboxProfile\AppData
          INSTALLER_FILE: ${{ steps.release.outputs.installer_file }}
        run: |
          $installerPath = Join-Path `
            "./artifacts/installer/output" $env:INSTALLER_FILE
          ./scripts/test-installer-roundtrip.ps1 `
            -InstallerPath $installerPath `
            -TestRoot "${{ runner.temp }}\QingToolboxInstallerRoundtrip" `
            -KeepTestFiles

      - name: Validate clean Preview source
        shell: pwsh
        run: ./scripts/assert-preview-source.ps1

      - name: Write Preview manifest
        shell: pwsh
        run: ./scripts/write-preview-manifest.ps1

      - name: Verify Preview assets and manifest
        shell: pwsh
        run: ./scripts/verify-preview-assets.ps1

      - name: Upload Preview validation diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: QingToolbox-preview-validation-diagnostics-${{ github.run_number }}
          retention-days: 10
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}\QingToolboxInstallerRoundtrip\install.log
            ${{ runner.temp }}\QingToolboxInstallerRoundtrip\uninstall.log
            ${{ runner.temp }}\QingToolboxInstallerRoundtrip\diagnostics.txt

      - name: Clean Preview validation test data
        if: always()
        shell: pwsh
        run: |
          $paths = @(
            "${{ runner.temp }}\QingToolboxInstallerRoundtrip",
            "${{ runner.temp }}\QingToolboxProfile"
          )
          foreach ($path in $paths) {
            if (Test-Path -LiteralPath $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
            }
          }

      - name: Upload Preview validation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          retention-days: 10
          if-no-files-found: error
          path: |
            artifacts/${{ steps.release.outputs.portable_file }}
            artifacts/${{ steps.release.outputs.portable_file }}.sha256
            artifacts/installer/output/${{ steps.release.outputs.installer_file }}
            artifacts/installer/output/${{ steps.release.outputs.installer_file }}.sha256
            artifacts/${{ steps.release.outputs.manifest_file }}
